<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cliente WebSocket Real-Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Exo 2', sans-serif;
            background: #080c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,170,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,170,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* Glowing orb in background */
        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,170,0.06) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 420px;
            background: rgba(10, 16, 22, 0.92);
            border: 1px solid rgba(0, 255, 170, 0.25);
            border-radius: 2px;
            padding: 0;
            box-shadow:
                0 0 40px rgba(0, 255, 170, 0.08),
                0 0 1px rgba(0, 255, 170, 0.5),
                inset 0 1px 0 rgba(0,255,170,0.1);
            backdrop-filter: blur(20px);
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Corner decorations */
        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: #00ffaa;
            border-style: solid;
        }
        .card::before {
            top: -1px; left: -1px;
            border-width: 2px 0 0 2px;
        }
        .card::after {
            bottom: -1px; right: -1px;
            border-width: 0 2px 2px 0;
        }

        .card-header {
            padding: 1.5rem 1.8rem 1.2rem;
            border-bottom: 1px solid rgba(0,255,170,0.12);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ffaa;
            box-shadow: 0 0 8px #00ffaa, 0 0 16px rgba(0,255,170,0.4);
            animation: blink 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .card-header h2 {
            font-family: 'Exo 2', sans-serif;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #00ffaa;
        }

        .card-header .subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            color: rgba(0,255,170,0.4);
            letter-spacing: 0.1em;
            margin-top: 2px;
        }

        .card-body {
            padding: 1.5rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .sensor-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
        }

        .sensor-row:nth-child(1) { animation-delay: 0.1s; }
        .sensor-row:nth-child(2) { animation-delay: 0.2s; }
        .sensor-row:nth-child(3) { animation-delay: 0.3s; }

        .sensor-row:last-child { border-bottom: none; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(180, 200, 220, 0.45);
        }

        .data {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: #e8f4ff;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }

        /* Temperature row special styling */
        .sensor-row.temp-row .data {
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.4);
            font-size: 1.4rem;
        }

        .sensor-row.temp-row .data::after {
            content: ' °C';
            font-size: 0.8rem;
            color: rgba(255,107,107,0.6);
        }

        .data.waiting {
            color: rgba(255,255,255,0.2);
            font-size: 0.85rem;
            font-style: italic;
        }

        .card-footer {
            padding: 0.8rem 1.8rem;
            border-top: 1px solid rgba(0,255,170,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem;
            color: rgba(0,255,170,0.3);
            letter-spacing: 0.1em;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0,255,170,0.6), transparent);
            animation: scan 3s ease-in-out infinite;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="scan-line"></div>

        <div class="card-header">
            <div>
                <h2>Monitor de Sensores</h2>
                <div class="subtitle">WSS // REAL-TIME DATA STREAM</div>
            </div>
            <div style="margin-left:auto; display:flex; align-items:center; gap:0.5rem;">
                <div class="status-dot"></div>
                <span style="font-family:'Share Tech Mono',monospace; font-size:0.6rem; color:rgba(0,255,170,0.5); letter-spacing:0.1em;">LIVE</span>
            </div>
        </div>

        <div class="card-body">
            <div class="sensor-row">
                <span class="label">ID del Sensor</span>
                <span id="id" class="data waiting">Esperando...</span>
            </div>
            <div class="sensor-row">
                <span class="label">Nombre</span>
                <span id="nombre" class="data waiting">Esperando...</span>
            </div>
            <div class="sensor-row temp-row">
                <span class="label">Temperatura</span>
                <span id="temp" class="data waiting">--</span>
            </div>
        </div>

        <div class="card-footer">
            <span class="footer-text">SYS:CONNECTED</span>
            <span class="footer-text" id="timestamp">--:--:--</span>
        </div>
    </div>

    <script>
        // Update timestamp
        setInterval(() => {
            const now = new Date();
            document.getElementById('timestamp').textContent =
                now.toTimeString().slice(0,8);
        }, 1000);

        // 1. Conectarse al servidor que creamos en Node.js
        const socket = new WebSocket('wss://localhost:8080');
        socket.onmessage = (event) => {
            // 2. Recibir el JSON y convertirlo a objeto JS
            const datos = JSON.parse(event.data);
            // 3. Actualizar la interfaz
            const idEl = document.getElementById('id');
            const nomEl = document.getElementById('nombre');
            const tempEl = document.getElementById('temp');

            idEl.innerText = datos.id;
            nomEl.innerText = datos.nombre;
            tempEl.innerText = datos.temperatura;

            [idEl, nomEl, tempEl].forEach(el => {
                el.classList.remove('waiting');
            });

            console.log("Datos recibidos:", datos);
        };
        socket.onopen = () => console.log("¡Conectado al servidor!");
        socket.onclose = () => alert("Conexión cerrada.");
    </script>
</body>
</html>
